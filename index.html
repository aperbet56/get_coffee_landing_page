<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get coffee | Landing page</title>
    <!-- Importation de la favicon -->
    <link rel="shortcut icon" href="img/logo_v2.svg" type="image/x-icon" />
    <!-- Importation des styles -->
    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Début du header -->
    <header>
      <div class="logo">
        <img src="img/logo.svg" alt="Logo Get coffee" />
      </div>
      <nav class="navigation">
        <ul class="navigation__list">
          <li class="navigation__list__item">
            <a href="#" class="navigation__list__item__link">Menu</a>
          </li>
          <li class="navigation__list__item">
            <a href="#" class="navigation__list__item__link">Contact</a>
          </li>
          <li class="navigation__list__item">
            <a href="#" class="navigation__list__item__link">Find us</a>
          </li>
        </ul>
      </nav>
    </header>
    <!-- Fin du header-->

    <!-- Début du main -->
    <main class="main__content">
      <!-- Début de la section container -->
      <section class="container">
        <article class="container__article">
          <h1 class="container__title">
            The best way to get your coffee without leaving the confort of your
            house.
          </h1>
          <button class="btn">Make your order</button>
          <ul class="container__list">
            <li class="container__list__item">
              <a href="#" class="container__list__item__link"
                ><img src="img/instagram.svg" alt="Instagram"
              /></a>
            </li>
            <li class="container__list__item">
              <a href="#" class="container__list__item__link"
                ><img src="img/twitter.svg" alt="Twitter"
              /></a>
            </li>
            <li class="container__list__item">
              <a href="#" class="container__list__item__link"
                ><img src="img/linkedin.svg" alt="LinkedIn"
              /></a>
            </li>
          </ul>
        </article>
        <div class="container__image">
          <img src="img/copo.svg" alt="coffee mug" />
        </div>
      </section>
      <!-- Fin de la section container-->
    </main>
    <!-- Fin du main -->

    <!-- Début du footer -->
    <footer>
      <p>
        &copy; <span class="footer__year"></span> - Get coffee. All rights
        reserved
      </p>
    </footer>
    <!-- Fin du footer-->

    <!-- Importation du fichier JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
